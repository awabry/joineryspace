<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joinery Space</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sticky Header */
        header {
            background: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        header img {
            max-width: 180px;
            height: auto;
        }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background: #e9eef3;
        }

        .hero h1 {
            margin: 0;
            font-size: 2.4rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
            flex: 1;
        }

        .gallery img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Mobile: single-column gallery */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }

        /* Sticky Footer */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px 20px;
            position: sticky;
            bottom: 0;
            z-index: 1000;
            box-shadow: 0 -2px 6px rgba(0,0,0,0.08);
        }

        .footer-content {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }

        footer a {
            color: #4eaaff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Joinery Space Logo">
</header>

<section class="hero" id="top">
    <h1>Joinery Space</h1>
    <p>Crafting exceptional joinery with precision, creativity, and care.</p>
</section>
